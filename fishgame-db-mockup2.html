<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魚機企劃資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060d1a;
    --surface: #0b1628;
    --surface2: #0f1e35;
    --border: #1a3a5c;
    --accent: #00c8ff;
    --accent2: #0ef5a0;
    --accent3: #ff6b35;
    --text: #c8dff0;
    --text-dim: #5a7a99;
    --text-bright: #eef6ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans TC',sans-serif; min-height:100vh; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, rgba(0,100,180,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 10% 50%, rgba(0,200,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 30% 40% at 90% 20%, rgba(0,245,160,0.04) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    background:rgba(6,13,26,0.92); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 32px; display:flex; align-items:center; gap:32px; height:64px;
  }
  .logo { font-family:'Orbitron',monospace; font-size:15px; font-weight:900; letter-spacing:2px; color:var(--accent); text-shadow:0 0 20px rgba(0,200,255,0.5); }
  .logo span { color:var(--accent2); }
  nav { display:flex; gap:4px; flex:1; }
  .nav-btn {
    padding:7px 20px; border-radius:6px; border:1px solid transparent;
    background:transparent; color:var(--text-dim);
    font-family:'Noto Sans TC',sans-serif; font-size:14px; cursor:pointer; transition:all 0.2s;
  }
  .nav-btn:hover { color:var(--text); background:rgba(0,200,255,0.06); }
  .nav-btn.active { color:var(--accent); background:rgba(0,200,255,0.1); border-color:rgba(0,200,255,0.25); }
  .sheet-link {
    display:flex; align-items:center; gap:6px; padding:7px 16px; border-radius:6px;
    border:1px solid rgba(14,245,160,0.3); background:rgba(14,245,160,0.06);
    color:var(--accent2); font-size:13px; text-decoration:none; transition:all 0.2s;
  }
  .sheet-link:hover { background:rgba(14,245,160,0.12); }

  /* LOADING */
  .loading-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(6,13,26,0.88); backdrop-filter:blur(6px);
    z-index:500; align-items:center; justify-content:center; flex-direction:column; gap:16px;
  }
  .loading-overlay.show { display:flex; }
  .spinner {
    width:40px; height:40px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-size:14px; color:var(--text-dim); letter-spacing:1px; }

  /* PAGES */
  .page { display:none; padding:32px; position:relative; z-index:1; }
  .page.active { display:block; }
  .section-title {
    font-family:'Orbitron',monospace; font-size:11px; letter-spacing:3px;
    color:var(--text-dim); text-transform:uppercase;
    margin-bottom:24px; display:flex; align-items:center; gap:12px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* FILTER */
  .filter-bar { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; align-items:center; }
  .search-input {
    flex:1; min-width:200px; padding:9px 16px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; color:var(--text);
    font-family:'Noto Sans TC',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }

  /* TABLE */
  .table-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  thead tr { background:var(--surface2); }
  th { padding:13px 16px; text-align:left; color:var(--text-dim); font-weight:500; font-size:12px; letter-spacing:0.5px; white-space:nowrap; border-bottom:1px solid var(--border); }
  td { padding:13px 16px; border-bottom:1px solid rgba(26,58,92,0.5); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(0,200,255,0.03); }
  .code-tag { font-family:'Orbitron',monospace; font-size:11px; color:var(--text-dim); letter-spacing:1px; }

  /* BOSS PAGE */
  .boss-controls { display:flex; gap:20px; margin-bottom:24px; flex-wrap:wrap; align-items:flex-start; }
  .ctrl-block { display:flex; flex-direction:column; gap:8px; }
  .tag-label { font-size:12px; color:var(--text-dim); letter-spacing:0.5px; }
  .tag-group { display:flex; gap:8px; flex-wrap:wrap; }
  .tag-chip {
    padding:5px 14px; border-radius:20px; border:1px solid var(--border);
    background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer;
    transition:all 0.2s; font-family:'Noto Sans TC',sans-serif;
  }
  .tag-chip:hover { color:var(--text); border-color:rgba(0,200,255,0.3); }
  .tag-chip.selected { background:rgba(0,200,255,0.1); border-color:var(--accent); color:var(--accent); }
  .boss-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .boss-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; overflow:hidden; transition:all 0.25s; cursor:pointer;
  }
  .boss-card:hover { border-color:rgba(0,200,255,0.4); transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,0,0,0.3); }
  .boss-card-header {
    padding:16px 20px 12px; display:flex; align-items:flex-start;
    justify-content:space-between; border-bottom:1px solid rgba(26,58,92,0.5);
  }
  .boss-name { font-size:15px; font-weight:700; color:var(--text-bright); margin-bottom:4px; }
  .boss-game { font-size:12px; color:var(--text-dim); }
  .boss-maxr { font-size:13px; color:var(--accent3); font-weight:600; white-space:nowrap; }
  .boss-tags { display:flex; gap:6px; flex-wrap:wrap; padding:12px 20px; min-height:44px; }
  .boss-tag { padding:3px 10px; border-radius:4px; font-size:11px; border:1px solid; }
  .tc0{color:#00c8ff;border-color:rgba(0,200,255,0.3);background:rgba(0,200,255,0.08);}
  .tc1{color:#0ef5a0;border-color:rgba(14,245,160,0.3);background:rgba(14,245,160,0.08);}
  .tc2{color:#ff6b35;border-color:rgba(255,107,53,0.3);background:rgba(255,107,53,0.08);}
  .tc3{color:#ffd700;border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.08);}
  .tc4{color:#b06bff;border-color:rgba(176,107,255,0.3);background:rgba(176,107,255,0.08);}
  .tc5{color:#ff6b9d;border-color:rgba(255,107,157,0.3);background:rgba(255,107,157,0.08);}
  .tc6{color:#4fc3f7;border-color:rgba(79,195,247,0.3);background:rgba(79,195,247,0.08);}
  .tc7{color:#a5d6a7;border-color:rgba(165,214,167,0.3);background:rgba(165,214,167,0.08);}
  .boss-videos { padding:0 20px 16px; display:flex; gap:8px; flex-wrap:wrap; }
  .video-pill {
    display:flex; align-items:center; gap:6px; padding:5px 12px; border-radius:6px;
    background:rgba(255,107,53,0.1); border:1px solid rgba(255,107,53,0.2);
    color:var(--accent3); font-size:12px; cursor:pointer; text-decoration:none; transition:all 0.2s;
  }
  .video-pill:hover { background:rgba(255,107,53,0.2); }

  /* TAG DEF PAGE */
  .tag-def-list { display:flex; flex-direction:column; gap:10px; max-width:760px; }
  .tag-def-item {
    display:flex; gap:20px; align-items:flex-start;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 20px; transition:border-color 0.2s;
  }
  .tag-def-item:hover { border-color:rgba(0,200,255,0.25); }
  .tag-def-name { min-width:100px; font-weight:600; font-size:13px; padding-top:2px; }
  .tag-def-desc { font-size:13px; color:var(--text-dim); line-height:1.7; }

  /* HISTORY empty */
  .empty-state { text-align:center; padding:80px 20px; color:var(--text-dim); font-size:14px; line-height:2; }
  .empty-state .icon { font-size:40px; margin-bottom:16px; opacity:0.4; }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.72); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; width:min(580px,92vw); max-height:82vh; overflow-y:auto; padding:28px; position:relative; }
  .modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; }
  .modal-title { font-size:18px; font-weight:700; color:var(--text-bright); margin-bottom:4px; }
  .modal-sub { font-size:13px; color:var(--text-dim); margin-bottom:4px; }
  .modal-maxr { font-size:13px; color:var(--accent3); font-weight:600; margin-bottom:20px; }
  .modal-section { margin-bottom:20px; }
  .modal-section h4 { font-size:11px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; margin-bottom:10px; }
  .video-list { display:flex; flex-direction:column; gap:8px; }
  .video-item {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:rgba(0,0,0,0.2); border-radius:8px; text-decoration:none; transition:background 0.2s;
  }
  .video-item:hover { background:rgba(255,107,53,0.1); }
  .video-num { width:24px; height:24px; border-radius:50%; background:rgba(255,107,53,0.15); color:var(--accent3); font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .video-desc { flex:1; font-size:13px; color:var(--text); }
  .video-play { font-size:11px; color:var(--accent3); }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">讀取 Google Sheets 資料中…</div>
</div>

<header>
  <div class="logo">FISH<span>DB</span></div>
  <nav>
    <button class="nav-btn active" onclick="showPage('games',this)">魚機資料</button>
    <button class="nav-btn" onclick="showPage('boss',this)">Boss 清單</button>
    <button class="nav-btn" onclick="showPage('tags',this)">玩法定義</button>
    <button class="nav-btn" onclick="showPage('history',this)">版本紀錄</button>
  </nav>
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1Yf7Y9PfbM_u96ovL2NnM9jvV5QB_yFfLM_bseAAs-p4/edit" target="_blank">✏️ 編輯資料</a>
</header>

<!-- 魚機資料 -->
<div class="page active" id="page-games">
  <div class="section-title">魚機資料庫</div>
  <div class="filter-bar">
    <input class="search-input" type="text" placeholder="搜尋遊戲名稱或專案代號…" oninput="filterGames(this.value)">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>遊戲名稱</th><th>專案代號</th></tr></thead>
      <tbody id="games-tbody"><tr><td colspan="3" style="text-align:center;color:var(--text-dim);padding:40px">讀取中…</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Boss 清單 -->
<div class="page" id="page-boss">
  <div class="section-title">Boss 清單</div>
  <div class="boss-controls">
    <div class="ctrl-block" style="flex:1;min-width:200px">
      <div class="tag-label">搜尋</div>
      <input class="search-input" id="boss-search" type="text" placeholder="搜尋 Boss 名稱…" oninput="filterBoss()">
    </div>
    <div class="ctrl-block">
      <div class="tag-label">依魚機篩選</div>
      <div class="tag-group" id="game-filter-group">
        <button class="tag-chip selected" onclick="setGameFilter(this,'all')">全部</button>
      </div>
    </div>
    <div class="ctrl-block">
      <div class="tag-label">依玩法標籤篩選</div>
      <div class="tag-group" id="tag-filter-group">
        <button class="tag-chip selected" onclick="setTagFilter(this,'all')">全部</button>
      </div>
    </div>
  </div>
  <div class="boss-grid" id="boss-grid"><div style="color:var(--text-dim);padding:40px">讀取中…</div></div>
</div>

<!-- 玩法定義 -->
<div class="page" id="page-tags">
  <div class="section-title">玩法標籤定義</div>
  <div id="tag-def-container"><div style="color:var(--text-dim);padding:40px">讀取中…</div></div>
</div>

<!-- 版本紀錄 -->
<div class="page" id="page-history">
  <div class="section-title">版本紀錄</div>
  <div class="empty-state">
    <div class="icon">📝</div>
    此功能尚未開放<br>
    <span style="font-size:12px">版本紀錄分頁建立後即可在此顯示</span>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-name"></div>
    <div class="modal-sub"   id="modal-game"></div>
    <div class="modal-maxr"  id="modal-maxr"></div>
    <div class="modal-section">
      <h4>玩法標籤</h4>
      <div id="modal-tags" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
    <div class="modal-section" id="modal-video-section">
      <h4>影片</h4>
      <div class="video-list" id="modal-videos"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  設定：只需改這裡
// ══════════════════════════════════════
const SHEET_ID = '1Yf7Y9PfbM_u96ovL2NnM9jvV5QB_yFfLM_bseAAs-p4';
const SHEET_NAMES = {
  games: '魚機資料庫',
  boss:  'Boss資料庫',
  tags:  '玩法標籤',
};

// ══════════════════════════════════════
//  Google Sheets 公開 API 讀取
// ══════════════════════════════════════
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const table = json.table;
  const allRows = table.rows || [];
  if (!allRows.length) return [];

  let cols, dataRows;
  if (table.parsedNumHeaders >= 1) {
    // Google 有正確識別標題列
    cols = table.cols.map(c => c.label);
    dataRows = allRows;
  } else {
    // 第一列當標題
    cols = (allRows[0].c || []).map(cell => cell?.v ?? '');
    dataRows = allRows.slice(1);
  }

  return dataRows
    .map(r => Object.fromEntries(cols.map((col, i) => [col, r.c?.[i]?.v ?? ''])))
    .filter(row => Object.values(row).some(v => v !== ''));
}

// ══════════════════════════════════════
//  全域資料
// ══════════════════════════════════════
let GAMES_DATA = [], BOSS_DATA = [], TAGS_DATA = [];
let ALL_TAG_NAMES = [];
let activeGameFilter = 'all', activeTagFilter = 'all';
let bossRenderCache = [];

// ══════════════════════════════════════
//  載入
// ══════════════════════════════════════
async function loadAll() {
  document.getElementById('loading').classList.add('show');
  try {
    [GAMES_DATA, BOSS_DATA, TAGS_DATA] = await Promise.all([
      fetchSheet(SHEET_NAMES.games),
      fetchSheet(SHEET_NAMES.boss),
      fetchSheet(SHEET_NAMES.tags),
    ]);
    ALL_TAG_NAMES = TAGS_DATA.map(t => t['玩法標籤']).filter(Boolean);
    renderGames(GAMES_DATA);
    buildBossFilters();
    renderBoss(BOSS_DATA);
    renderTagDefs();
  } catch(e) {
    console.error(e);
    document.getElementById('games-tbody').innerHTML =
      `<tr><td colspan="3" style="text-align:center;color:var(--accent3);padding:40px">
        ⚠️ 讀取失敗。請確認 Google Sheets 是否已設為「知道連結的人可以檢視」。
      </td></tr>`;
    document.getElementById('boss-grid').innerHTML =
      `<div style="color:var(--accent3);padding:20px">⚠️ 讀取失敗</div>`;
  }
  document.getElementById('loading').classList.remove('show');
}

// ══════════════════════════════════════
//  魚機資料
// ══════════════════════════════════════
function renderGames(data) {
  const tbody = document.getElementById('games-tbody');
  if (!data.length) { tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--text-dim);padding:40px">尚無資料</td></tr>`; return; }
  tbody.innerHTML = data.map(g => `
    <tr>
      <td style="color:var(--text-dim);font-family:'Orbitron',monospace;font-size:11px">${g['編號'] ?? ''}</td>
      <td style="font-weight:600;color:var(--text-bright)">${g['遊戲名稱'] ?? ''}</td>
      <td><span class="code-tag">${g['專案名稱'] ?? ''}</span></td>
    </tr>`).join('');
}
function filterGames(q) {
  renderGames(GAMES_DATA.filter(g => (g['遊戲名稱']??'').includes(q) || (g['專案名稱']??'').includes(q)));
}

// ══════════════════════════════════════
//  Boss 清單
// ══════════════════════════════════════
function tagColor(t) {
  const i = ALL_TAG_NAMES.indexOf(t);
  return `tc${(i < 0 ? Math.abs(t.charCodeAt(0)) : i) % 8}`;
}
function parseTags(raw) {
  if (!raw) return [];
  return String(raw).split(/[,，\s]+/).map(t => t.trim()).filter(Boolean);
}
function parseVideos(b) {
  const videos = [];
  for (let i = 1; i <= 5; i++) {
    const url  = (b[`影片${i}連結`] ?? '').trim();
    const desc = (b[`影片${i}說明`] ?? '').trim();
    if (url) videos.push({ u: url, d: desc || `影片 ${i}` });
  }
  return videos;
}

function buildBossFilters() {
  const games = [...new Set(BOSS_DATA.map(b => b['所屬魚機']).filter(Boolean))];
  const gGroup = document.getElementById('game-filter-group');
  gGroup.innerHTML = `<button class="tag-chip selected" onclick="setGameFilter(this,'all')">全部</button>`;
  games.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'tag-chip'; btn.textContent = name;
    btn.onclick = () => setGameFilter(btn, name);
    gGroup.appendChild(btn);
  });

  const tGroup = document.getElementById('tag-filter-group');
  tGroup.innerHTML = `<button class="tag-chip selected" onclick="setTagFilter(this,'all')">全部</button>`;
  ALL_TAG_NAMES.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-chip'; btn.textContent = tag;
    btn.onclick = () => setTagFilter(btn, tag);
    tGroup.appendChild(btn);
  });
}

function renderBoss(data) {
  bossRenderCache = data;
  const grid = document.getElementById('boss-grid');
  if (!data.length) { grid.innerHTML = `<div style="color:var(--text-dim);padding:40px;grid-column:1/-1">找不到符合條件的 Boss</div>`; return; }
  grid.innerHTML = data.map((b, i) => {
    const tags   = parseTags(b['玩法標籤']);
    const videos = parseVideos(b);
    const maxR   = b['最大倍率'] ? `${b['最大倍率']}` : '';
    return `
      <div class="boss-card" onclick="openModal(${i})">
        <div class="boss-card-header">
          <div>
            <div class="boss-name">${b['Boss名稱'] ?? ''}</div>
            <div class="boss-game">${b['所屬魚機'] ?? ''}</div>
          </div>
          ${maxR ? `<div class="boss-maxr">${maxR}</div>` : ''}
        </div>
        <div class="boss-tags">
          ${tags.map(t => `<span class="boss-tag ${tagColor(t)}">${t}</span>`).join('') || '<span style="color:var(--text-dim);font-size:12px">尚無標籤</span>'}
        </div>
        ${videos.length ? `
        <div class="boss-videos">
          ${videos.slice(0,3).map(v => `<a class="video-pill" href="${v.u}" target="_blank" onclick="event.stopPropagation()">▶ ${v.d}</a>`).join('')}
          ${videos.length > 3 ? `<span style="font-size:12px;color:var(--text-dim);align-self:center">+${videos.length - 3}</span>` : ''}
        </div>` : ''}
      </div>`;
  }).join('');
}

function filterBoss() {
  const q = document.getElementById('boss-search').value;
  let data = BOSS_DATA.filter(b => (b['Boss名稱']??'').includes(q));
  if (activeGameFilter !== 'all') data = data.filter(b => b['所屬魚機'] === activeGameFilter);
  if (activeTagFilter  !== 'all') data = data.filter(b => parseTags(b['玩法標籤']).includes(activeTagFilter));
  renderBoss(data);
}
function setGameFilter(el, val) {
  document.querySelectorAll('#game-filter-group .tag-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected'); activeGameFilter = val; filterBoss();
}
function setTagFilter(el, val) {
  document.querySelectorAll('#tag-filter-group .tag-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected'); activeTagFilter = val; filterBoss();
}

// ══════════════════════════════════════
//  玩法定義
// ══════════════════════════════════════
function renderTagDefs() {
  const container = document.getElementById('tag-def-container');
  if (!TAGS_DATA.length) { container.innerHTML = `<div style="color:var(--text-dim);padding:40px">尚無資料</div>`; return; }
  container.innerHTML = `<div class="tag-def-list">` +
    TAGS_DATA.map((t, i) => `
      <div class="tag-def-item">
        <span class="boss-tag tc${i%8} tag-def-name" style="min-width:100px;text-align:center">${t['玩法標籤']??''}</span>
        <span class="tag-def-desc">${t['標籤定義']??''}</span>
      </div>`).join('') +
  `</div>`;
}

// ══════════════════════════════════════
//  Modal
// ══════════════════════════════════════
function openModal(idx) {
  const b      = bossRenderCache[idx];
  const tags   = parseTags(b['玩法標籤']);
  const videos = parseVideos(b);
  const maxR   = b['最大倍率'] ? `最大倍率 ${b['最大倍率']}` : '';

  document.getElementById('modal-name').textContent = b['Boss名稱'] ?? '';
  document.getElementById('modal-game').textContent = b['所屬魚機'] ?? '';
  document.getElementById('modal-maxr').textContent = maxR;
  document.getElementById('modal-tags').innerHTML = tags.length
    ? tags.map(t => `<span class="boss-tag ${tagColor(t)}">${t}</span>`).join('')
    : `<span style="color:var(--text-dim);font-size:12px">尚無標籤</span>`;

  const vSection = document.getElementById('modal-video-section');
  if (videos.length) {
    document.getElementById('modal-videos').innerHTML = videos.map((v, i) => `
      <a class="video-item" href="${v.u}" target="_blank">
        <div class="video-num">${i + 1}</div>
        <div class="video-desc">${v.d}</div>
        <div class="video-play">▶ 開啟</div>
      </a>`).join('');
    vSection.style.display = '';
  } else {
    vSection.style.display = 'none';
  }
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

// ══════════════════════════════════════
//  Nav
// ══════════════════════════════════════
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

loadAll();
</script>
